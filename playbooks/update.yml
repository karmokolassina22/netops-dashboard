---
- name: Mise à jour des paquets système
  hosts: all
  become: true
  tasks:
    - name: Mettre à jour le cache apt
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
    - name: Mettre à jour tous les paquets
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true
        autoclean: true
    - name: Vérifier si redémarrage nécessaire
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
    - name: Afficher si redémarrage nécessaire
      ansible.builtin.debug:
        msg: "⚠️ {{ inventory_hostname }} nécessite un redémarrage"
      when: reboot_required.stat.exists